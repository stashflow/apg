<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Greenhouse effect diagram">
  <rect width="1200" height="675" fill="#081425"/>
  <text x="60" y="70" fill="#e8f2ff" font-size="38" font-family="Arial" font-weight="700">Greenhouse Effect (Simplified)</text>

  <circle cx="980" cy="120" r="55" fill="#ffd267"/>
  <text x="948" y="128" fill="#5b4700" font-size="22" font-family="Arial">Sun</text>

  <ellipse cx="520" cy="520" rx="280" ry="110" fill="#2f8f6f"/>
  <path d="M200 420 Q520 180 840 420" fill="none" stroke="#8ec6ff" stroke-width="8"/>
  <text x="460" y="220" fill="#cde6ff" font-size="24" font-family="Arial">Atmosphere</text>

  <line x1="930" y1="170" x2="650" y2="430" stroke="#ffe28f" stroke-width="5"/>
  <line x1="890" y1="160" x2="610" y2="420" stroke="#ffe28f" stroke-width="5"/>
  <text x="700" y="300" fill="#ffefbf" font-size="22" font-family="Arial">Incoming shortwave</text>

  <line x1="500" y1="470" x2="500" y2="310" stroke="#ff9b9b" stroke-width="5"/>
  <line x1="560" y1="470" x2="560" y2="330" stroke="#ff9b9b" stroke-width="5"/>
  <text x="575" y="365" fill="#ffd1d1" font-size="22" font-family="Arial">Outgoing longwave (IR)</text>

  <path d="M560 330 Q700 300 710 420" fill="none" stroke="#ff9b9b" stroke-width="5"/>
  <text x="720" y="420" fill="#ffd1d1" font-size="22" font-family="Arial">re-radiated back</text>

  <text x="60" y="620" fill="#9ec2df" font-size="22" font-family="Arial">Higher greenhouse gas concentration traps more outgoing IR, increasing average surface temperature.</text>
</svg>
