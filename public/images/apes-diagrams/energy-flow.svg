<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Energy flow trophic pyramid">
  <rect width="1200" height="675" fill="#081629"/>
  <text x="60" y="70" fill="#e5f2ff" font-size="38" font-family="Arial" font-weight="700">Energy Flow and Trophic Efficiency</text>

  <polygon points="600,130 830,560 370,560" fill="#123652" stroke="#6cc6ff" stroke-width="3"/>
  <line x1="447" y1="420" x2="753" y2="420" stroke="#6cc6ff" stroke-width="2"/>
  <line x1="523" y1="280" x2="677" y2="280" stroke="#6cc6ff" stroke-width="2"/>

  <text x="540" y="545" fill="#c6ecff" font-size="28" font-family="Arial">Producers ~10,000 kcal</text>
  <text x="510" y="405" fill="#c6ecff" font-size="26" font-family="Arial">Primary Consumers ~1,000 kcal</text>
  <text x="540" y="265" fill="#c6ecff" font-size="24" font-family="Arial">Secondary ~100 kcal</text>
  <text x="575" y="165" fill="#c6ecff" font-size="22" font-family="Arial">Tertiary ~10 kcal</text>

  <path d="M890 200 L1040 200 L1040 520 L890 520" fill="none" stroke="#ffb067" stroke-width="3"/>
  <text x="900" y="240" fill="#ffd6ad" font-size="24" font-family="Arial">Energy lost as heat</text>
  <text x="900" y="280" fill="#ffd6ad" font-size="22" font-family="Arial">respiration</text>
  <text x="900" y="310" fill="#ffd6ad" font-size="22" font-family="Arial">movement</text>
  <text x="900" y="340" fill="#ffd6ad" font-size="22" font-family="Arial">waste</text>

  <text x="70" y="220" fill="#8fd1ff" font-size="24" font-family="Arial">~10% rule:</text>
  <text x="70" y="252" fill="#bde6ff" font-size="21" font-family="Arial">Only about 10% of energy passes</text>
  <text x="70" y="282" fill="#bde6ff" font-size="21" font-family="Arial">to the next trophic level.</text>

  <text x="70" y="610" fill="#9cc2dc" font-size="22" font-family="Arial">Exam use: explain why food chains are short and why biomass declines at higher levels.</text>
</svg>
