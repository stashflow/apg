<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Demographic transition model">
  <rect width="1200" height="675" fill="#0b1627"/>
  <text x="60" y="70" fill="#ecf5ff" font-size="38" font-family="Arial" font-weight="700">Demographic Transition Model</text>

  <line x1="100" y1="560" x2="1120" y2="560" stroke="#8fb7dd" stroke-width="3"/>
  <line x1="100" y1="560" x2="100" y2="120" stroke="#8fb7dd" stroke-width="3"/>

  <rect x="100" y="120" width="204" height="440" fill="#172d48" opacity="0.65"/>
  <rect x="304" y="120" width="204" height="440" fill="#1e3b60" opacity="0.65"/>
  <rect x="508" y="120" width="204" height="440" fill="#254871" opacity="0.65"/>
  <rect x="712" y="120" width="204" height="440" fill="#2c557f" opacity="0.65"/>
  <rect x="916" y="120" width="204" height="440" fill="#355f8c" opacity="0.65"/>

  <text x="170" y="590" fill="#c9e2ff" font-size="20" font-family="Arial">1</text>
  <text x="375" y="590" fill="#c9e2ff" font-size="20" font-family="Arial">2</text>
  <text x="580" y="590" fill="#c9e2ff" font-size="20" font-family="Arial">3</text>
  <text x="785" y="590" fill="#c9e2ff" font-size="20" font-family="Arial">4</text>
  <text x="990" y="590" fill="#c9e2ff" font-size="20" font-family="Arial">5</text>

  <polyline points="100,180 304,185 508,245 712,420 916,435 1120,430" fill="none" stroke="#ff8f8f" stroke-width="5"/>
  <polyline points="100,175 304,178 508,175 712,190 916,215 1120,245" fill="none" stroke="#8ff0c5" stroke-width="5"/>

  <text x="875" y="268" fill="#8ff0c5" font-size="22" font-family="Arial">Birth rate</text>
  <text x="900" y="470" fill="#ffb5b5" font-size="22" font-family="Arial">Death rate</text>

  <text x="120" y="635" fill="#a5c7e8" font-size="22" font-family="Arial">Key APES pattern: Rapid growth in Stage 2 as death rate drops before birth rate falls.</text>
</svg>
