<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Eutrophication process diagram">
  <rect width="1200" height="675" fill="#0a1727"/>
  <text x="60" y="70" fill="#e8f6ff" font-size="38" font-family="Arial" font-weight="700">Eutrophication Sequence</text>

  <rect x="80" y="130" width="260" height="140" rx="12" fill="#1a3350" stroke="#79b6f3"/>
  <text x="104" y="190" fill="#d9eeff" font-size="24" font-family="Arial">1) Nutrient input</text>
  <text x="104" y="224" fill="#d9eeff" font-size="21" font-family="Arial">(N and P runoff)</text>

  <rect x="380" y="130" width="260" height="140" rx="12" fill="#1d4a42" stroke="#7de0c7"/>
  <text x="404" y="190" fill="#e2fff6" font-size="24" font-family="Arial">2) Algal bloom</text>
  <text x="404" y="224" fill="#e2fff6" font-size="21" font-family="Arial">light blocked</text>

  <rect x="680" y="130" width="260" height="140" rx="12" fill="#4a3f2a" stroke="#e9cc8b"/>
  <text x="704" y="190" fill="#fff4d8" font-size="24" font-family="Arial">3) Decomposition</text>
  <text x="704" y="224" fill="#fff4d8" font-size="21" font-family="Arial">bacteria consume O₂</text>

  <rect x="980" y="130" width="160" height="140" rx="12" fill="#512727" stroke="#f39b9b"/>
  <text x="995" y="188" fill="#ffe1e1" font-size="24" font-family="Arial">4) Hypoxia</text>
  <text x="995" y="222" fill="#ffe1e1" font-size="21" font-family="Arial">fish die-off</text>

  <line x1="340" y1="200" x2="380" y2="200" stroke="#9fd5ff" stroke-width="4"/>
  <line x1="640" y1="200" x2="680" y2="200" stroke="#9fd5ff" stroke-width="4"/>
  <line x1="940" y1="200" x2="980" y2="200" stroke="#9fd5ff" stroke-width="4"/>

  <rect x="80" y="340" width="1060" height="240" rx="16" fill="#0f2b45" stroke="#5fa6e4"/>
  <text x="110" y="390" fill="#d6edff" font-size="26" font-family="Arial">APES FRQ move:</text>
  <text x="110" y="430" fill="#c3e4ff" font-size="23" font-family="Arial">Source (fertilizer/sewage) -> process (bloom + decay) -> effect (low DO) -> solution (buffer strips, wastewater treatment).</text>
  <text x="110" y="475" fill="#c3e4ff" font-size="23" font-family="Arial">Key metric: dissolved oxygen (DO) drops as biological oxygen demand (BOD) rises.</text>
</svg>
