<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Carbon cycle diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071a2d"/>
      <stop offset="100%" stop-color="#0f2f2a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#8be7c1"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="60" y="68" fill="#d8f7e8" font-size="38" font-family="Arial" font-weight="700">Carbon Cycle (APES)</text>

  <rect x="80" y="130" width="220" height="90" rx="12" fill="#18453f" stroke="#79d8a7"/>
  <text x="110" y="185" fill="#d7fff0" font-size="28" font-family="Arial">Atmosphere</text>

  <rect x="470" y="110" width="260" height="95" rx="12" fill="#1e5132" stroke="#9fe8b6"/>
  <text x="500" y="168" fill="#e7ffef" font-size="27" font-family="Arial">Plants (Biomass)</text>

  <rect x="860" y="145" width="250" height="95" rx="12" fill="#3b3d21" stroke="#e3dd8a"/>
  <text x="887" y="201" fill="#fffbd6" font-size="26" font-family="Arial">Fossil Fuels</text>

  <rect x="470" y="330" width="260" height="95" rx="12" fill="#32554f" stroke="#8de7d2"/>
  <text x="505" y="388" fill="#e8fffb" font-size="28" font-family="Arial">Soils & Detritus</text>

  <rect x="120" y="440" width="240" height="95" rx="12" fill="#1f3e58" stroke="#95cbf5"/>
  <text x="148" y="497" fill="#ddf0ff" font-size="28" font-family="Arial">Ocean Reservoir</text>

  <line x1="300" y1="170" x2="470" y2="160" stroke="#8be7c1" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="332" y="146" fill="#b7f4de" font-size="20" font-family="Arial">photosynthesis</text>

  <line x1="470" y1="195" x2="300" y2="205" stroke="#8be7c1" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="350" y="228" fill="#b7f4de" font-size="20" font-family="Arial">respiration</text>

  <line x1="620" y1="205" x2="620" y2="330" stroke="#8de7d2" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="640" y="285" fill="#bdf7ea" font-size="20" font-family="Arial">litterfall</text>

  <line x1="730" y1="160" x2="860" y2="180" stroke="#d5d08f" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="742" y="135" fill="#efe9aa" font-size="20" font-family="Arial">burial (long-term)</text>

  <line x1="955" y1="240" x2="270" y2="140" stroke="#ff9f9f" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="800" y="284" fill="#ffd5d5" font-size="20" font-family="Arial">combustion to atmosphere</text>

  <line x1="360" y1="470" x2="80" y2="220" stroke="#9ad2ff" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="245" y="403" fill="#cfe9ff" font-size="20" font-family="Arial">air-sea exchange</text>

  <text x="60" y="620" fill="#9ac8b6" font-size="22" font-family="Arial">Key APES idea: Fluxes can change quickly, but major reservoirs respond at different timescales.</text>
</svg>
