<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Ocean acidification chemistry">
  <rect width="1200" height="675" fill="#081929"/>
  <text x="60" y="70" fill="#e3f4ff" font-size="38" font-family="Arial" font-weight="700">Ocean Acidification (Chemistry Chain)</text>

  <rect x="90" y="150" width="240" height="120" rx="12" fill="#1f3e5d" stroke="#8ec9ff"/>
  <text x="140" y="220" fill="#d9efff" font-size="34" font-family="Arial">CO₂ ↑</text>

  <rect x="380" y="150" width="280" height="120" rx="12" fill="#24506a" stroke="#95e0ff"/>
  <text x="412" y="205" fill="#def7ff" font-size="28" font-family="Arial">CO₂ + H₂O -> H₂CO₃</text>
  <text x="412" y="238" fill="#def7ff" font-size="22" font-family="Arial">carbonic acid forms</text>

  <rect x="710" y="150" width="220" height="120" rx="12" fill="#3d4a63" stroke="#d4c8ff"/>
  <text x="742" y="220" fill="#f0e8ff" font-size="30" font-family="Arial">pH ↓</text>

  <rect x="960" y="150" width="170" height="120" rx="12" fill="#5a3240" stroke="#ffb2c9"/>
  <text x="980" y="220" fill="#ffe3ee" font-size="28" font-family="Arial">CaCO₃ ↓</text>

  <line x1="330" y1="210" x2="380" y2="210" stroke="#9ad9ff" stroke-width="4"/>
  <line x1="660" y1="210" x2="710" y2="210" stroke="#9ad9ff" stroke-width="4"/>
  <line x1="930" y1="210" x2="960" y2="210" stroke="#9ad9ff" stroke-width="4"/>

  <rect x="90" y="340" width="1040" height="230" rx="14" fill="#10253a" stroke="#6ea7d4"/>
  <text x="120" y="390" fill="#d6ecff" font-size="25" font-family="Arial">Impact: shell-forming organisms (corals, mollusks, some plankton) struggle to build calcium carbonate structures.</text>
  <text x="120" y="435" fill="#c2e2ff" font-size="23" font-family="Arial">APES exam link: connect atmospheric CO₂ rise to marine ecosystem and food-web consequences.</text>
  <text x="120" y="480" fill="#c2e2ff" font-size="23" font-family="Arial">Mitigation focus: reduce CO₂ emissions; local stress reduction helps reef resilience but does not solve chemistry driver.</text>
</svg>
